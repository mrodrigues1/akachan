# Types the Compose compiler can't prove stable by inference but which are deeply immutable.
# Marking them stable lets composables that receive them (directly or as fields of domain
# data classes) skip recomposition when their inputs are unchanged. These are all immutable
# value types from java.time — safe to treat as stable.
java.time.Instant
java.time.LocalDate
java.time.LocalTime
java.time.Duration
java.time.ZoneId
java.time.Period
