name: PR Checks

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    if: github.head_ref != 'chore/release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::Missing GOOGLE_SERVICES_JSON repository secret"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Run unit tests and coverage gate
        run: ./gradlew test :app:koverVerify

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kover-coverage-report
          path: app/build/reports/kover/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: app/build/reports/tests/

  instrumentation-tests:
    name: Instrumentation Tests Shard (${{ matrix.shard.display }}/2)
    runs-on: ubuntu-latest
    if: github.head_ref != 'chore/release'
    strategy:
      fail-fast: false
      matrix:
        shard:
          - index: 0
            display: 1
          - index: 1
            display: 2

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -z "${GOOGLE_SERVICES_JSON:-}" ]; then
            echo "::error::Missing GOOGLE_SERVICES_JSON repository secret"
            exit 1
          fi
          printf '%s' "$GOOGLE_SERVICES_JSON" > app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumentation tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 29
          arch: x86_64
          profile: Nexus 6
          script: |
            ./gradlew :app:connectedDebugAndroidTest \
              -Pandroid.testInstrumentationRunnerArguments.numShards=2 \
              -Pandroid.testInstrumentationRunnerArguments.shardIndex=${{ matrix.shard.index }}

      - name: Upload instrumentation test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumentation-test-results-shard-${{ matrix.shard.display }}
          path: app/build/reports/androidTests/

  instrumentation-tests-result:
    name: Instrumentation Tests
    runs-on: ubuntu-latest
    needs: instrumentation-tests
    if: always() && github.head_ref != 'chore/release'

    steps:
      - name: Verify instrumentation shards
        run: |
          if [ "${{ needs.instrumentation-tests.result }}" != "success" ]; then
            echo "::error::One or more instrumentation test shards failed"
            exit 1
          fi
